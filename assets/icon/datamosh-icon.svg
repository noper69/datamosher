<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Datamosh glitched wordmark app icon</title>
  <desc id="desc">A simple dark app icon with the word DATAMOSH in glitched magenta, cyan, and white letters.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06060a"/>
      <stop offset="0.45" stop-color="#111018"/>
      <stop offset="1" stop-color="#020204"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="58%">
      <stop offset="0" stop-color="#ff00ff" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#00ffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect x="48" y="48" width="928" height="928" rx="184" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="4"/>
  <circle cx="512" cy="500" r="430" fill="url(#glow)"/>

  <g opacity="0.18">
    <rect x="104" y="214" width="814" height="8" fill="#00ffff"/>
    <rect x="80" y="634" width="850" height="6" fill="#ff00ff"/>
    <rect x="145" y="752" width="695" height="4" fill="#ffffff"/>
    <rect x="190" y="278" width="56" height="12" fill="#ff00ff"/>
    <rect x="744" y="336" width="128" height="10" fill="#00ffff"/>
    <rect x="120" y="704" width="210" height="9" fill="#ffffff"/>
  </g>

  <g filter="url(#softShadow)" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-weight="900" text-anchor="middle" letter-spacing="-8">
    <text x="506" y="476" font-size="154" fill="#00ffff" opacity="0.85">DATA</text>
    <text x="520" y="476" font-size="154" fill="#ff00ff" opacity="0.85">DATA</text>
    <text x="512" y="476" font-size="154" fill="#f7f7ff">DATA</text>

    <text x="500" y="632" font-size="154" fill="#00ffff" opacity="0.86">MOSH</text>
    <text x="526" y="632" font-size="154" fill="#ff00ff" opacity="0.86">MOSH</text>
    <text x="512" y="632" font-size="154" fill="#f7f7ff">MOSH</text>
  </g>

  <g opacity="0.9">
    <rect x="250" y="386" width="196" height="22" fill="#06060a"/>
    <rect x="264" y="386" width="182" height="7" fill="#ff00ff"/>
    <rect x="590" y="548" width="214" height="22" fill="#06060a"/>
    <rect x="590" y="563" width="188" height="7" fill="#00ffff"/>
    <rect x="322" y="654" width="126" height="16" fill="#06060a"/>
    <rect x="322" y="666" width="98" height="5" fill="#ff00ff"/>
    <rect x="618" y="330" width="156" height="17" fill="#06060a"/>
    <rect x="650" y="330" width="124" height="5" fill="#00ffff"/>
  </g>

  <g opacity="0.52">
    <rect x="132" y="418" width="70" height="18" fill="#ff00ff"/>
    <rect x="816" y="476" width="92" height="18" fill="#00ffff"/>
    <rect x="174" y="574" width="106" height="16" fill="#00ffff"/>
    <rect x="750" y="682" width="122" height="16" fill="#ff00ff"/>
  </g>
</svg>
